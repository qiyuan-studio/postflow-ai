version: '3.8'

services:
  postflow-ai:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/dev.db
      - AUTH_SECRET=${AUTH_SECRET:-postflow-prod-secret-change-me}
      - AUTH_URL=http://localhost:3000
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-sk-your-deepseek-key}
      - DEEPSEEK_BASE_URL=https://api.deepseek.com
      - DEEPSEEK_MODEL=deepseek-v4-flash
    volumes:
      - postflow-data:/app/data
    restart: unless-stopped

volumes:
  postflow-data:
